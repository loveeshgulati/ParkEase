services:
  # RabbitMQ (Private Service)
  - type: pserv
    name: parkease-rabbitmq
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile.rabbitmq
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: guest
      - key: RABBITMQ_DEFAULT_PASS
        value: guest

  # Auth Service
  - type: web
    name: parkease-auth
    runtime: docker
    dockerContext: .
    dockerfilePath: ParkEase.Auth/Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: RabbitMQ__Host
        value: parkease-rabbitmq
      - key: ConnectionStrings__DefaultConnection
        value: Host=dpg-d7is8kvaqgkc73a4d3f0-a.virginia-postgres.render.com;Port=5432;Database=parkease_auth;Username=parkease_yfo2_user;Password=EVSwWebkrsxGPZiLjqGsnYxh8eEcFn0W;SSL Mode=Require;TrustServerCertificate=true

